3logseq____&quot;,logseq____&quot;^1@logseq____&quot;,logseq____&quot;61e14ed4-5a34-4163-9a52-f44580ad1f8elogseq____&quot;],536870921]],[logseq____&quot;^15logseq____&quot;,[354,logseq____&quot;^17logseq____&quot;,true,536870921]],[logseq____&quot;^15logseq____&quot;,[354,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u61e14ed4-5a34-4163-9a52-f44580ad1f8elogseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;相比之下，在以太坊的世界中，开发文化更着眼于未来，对应的又号是：move fast and break things。如果需要一项更改，就实现它，即使这意味着废弃之前的假设、破坏兼容性，或者导致客户端被迫更新。以太坊开发文化的特点是快速创新、快速变革，敢于进行前瞻性实验，即使牺牲后向兼容性也在所不惜。对于开发者而言，这意味着你需要保持一定的灵活度，当底层的假设改变时，准备好重新构建基础架构。以太坊开发者所面对的最大挑战是，把自己的代码部署到不可变的系统上，还是部署到不断发展和演化的平台上，这是一对固有的矛盾。仅仅“升级”智能合约是不够的。你必须准备好重新部署，还要迁移用户、应用和资金，全部重新开始。\\nls-type:: annotation\\nhl-page:: 62\\nid:: 61e697f6-1c6e-4617-8e75-29580bc89226logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^Flogseq____&quot;,362,536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^Xlogseq____&quot;,348,536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^Vlogseq____&quot;,348,536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^Ulogseq____&quot;,348,536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^1Mlogseq____&quot;,logseq____&quot;annotationlogseq____&quot;,logseq____&quot;^1Nlogseq____&quot;,62,logseq____&quot;^1@logseq____&quot;,logseq____&quot;61e697f6-1c6e-4617-8e75-29580bc89226logseq____&quot;],536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot;^Jlogseq____&quot;,[logseq____&quot;^1Mlogseq____&quot;,logseq____&quot;^1Nlogseq____&quot;,logseq____&quot;^1@logseq____&quot;],536870921]],[logseq____&quot;^15logseq____&quot;,[355,logseq____&quot gseq____&quot;^ logseq____&quot;,logseq____&quot;^1Mlogseq____&quot;,logseq____&quot;annotationlogseq____&quot;,logseq____&quot;^1Nlogseq____&quot;,logseq____&quot;49logseq____&quot;,logseq____&quot;^1@logseq____&quot;,logseq____&quot;61e14bf8-8c8e-41f4-9b1d-f04bb7fbf38alogseq____&quot;],536870921]],[logseq____&quot;^15logseq____&quot;,[356,logseq____&quot;^17logseq____&quot;,true,536870921]],[logseq____&quot;^15logseq____&quot;,[356,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u61e14bf8-8c8e-41f4-9b1d-f04bb7fbf38alogseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[357,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;在MetaMask钱包中创建的账户类型称为外部账户（EOA）。外部账户是拥有私钥的账户，拥有私钥意味着控制对以太币或合约的访问。现在，你可能猜测还有其他类型的账户。另一种账户是合约账户。合约账户具有智能合约代码，而外部账户不具有。此外，合约账户没有私钥。相反，它由其智能合约代码的逻辑所拥有（并受其控制）。智能合约代码是在合约账户创建时由以太坊区块链记录的软件程序，由EVM执行。合约具有地址，就像外部账户一样。合约也可以发送和接收以太币。但是，当交易目标是合约地址时，它会导致该合同在EVM中运行，使用交易和交易的数据作为其输入。除了以太币之外，交易还可以包含指示合约中要运行的特定函数以及要传递给该函数参数的数据。通过这种方式，交易可以调用合约中的函数。请注意，由于合约账户没有私钥，因此无法启动交易。只有外部账户才能启动交易，但合约可以通过调用其他合约，构建复杂的执行路径来对交易做出反应。这种情况的一个典型用途是外部账户向多重签名智能合约钱包发送请求交易，将一些以太币发送到另一个地址。典型的DApp编程模式是让合约A调用合约B，以便在合约A的用户之间维持共享状态。\\nls-type:: annotation\\nhl-page:: 82\\nid:: 61ea8e5a-3452-4317-8672-b7714433c2e7logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[357,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[357,logseq____&quot;^Flogseq____&quot;,352,536870921]],[logseq____&quot;^15logseq____&quot;,[357,logseq____&quot;^Xlogseq____&quot;,348,536870921]],[logseq____&quot;^15logseq____&quot;,[357,logseq____&quot;^Vlogseq____&quot;,348,536870921]],[logseq____&quot;^15logseq____&quot;,[357,logseq____&quot;^Ulogseq____&quot;,348,536870921]],[logseq____&quot;^15logseq____&quot;,[357,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^1Mlogseq____&quot;,logseq____&quot;annotationlogseq____&quot;,logseq____&quot;^1Nlogseq____&quot;,82,logseq____&quot;^1@logseq 记为班长的自治区党委一班人，坚持以习近平新时代中国特色社会主义思想为指导，团结带领全区各族干部群众，推动新疆工作取得重大成效。陈全国书记为新疆的改革发展稳定事业倾注了大量心血、作出了重要贡献。我将牢记习近平总书记的殷殷嘱托，认真贯彻落实第三次中央新疆工作座谈会精神和习近平总书记关于新疆工作的重要讲话重要指示精神，同全区各族干部群众一道，依法治疆、团结稳疆、文化润疆、富民兴疆、长期建疆，一步一个脚印把习近平总书记为新疆擘画的宏伟蓝图变成美好现实。一是始终坚持对党忠诚，旗帜鲜明讲政治。二是完整准确贯彻新时代党的治疆方略，坚持把社会稳定和长治久安作为新疆工作总目标，坚定不移促进新疆社会大局持续稳定长期稳定，决不让来之不易的稳定形势发生逆转。三是以人民为中心推进经济高质量发展。四是坚持全面从严治党，坚决扛起管党治党政治责任。五是坚持以身作则，永葆清正廉洁政治本色。\\n党委副书记艾尔肯·吐尼亚孜表示，衷心拥护、坚决服从党中央关于自治区党委主要领导同志调整的决定。他说，陈全国同志到新疆工作以来，面对严峻复杂的形势，在以==习近平==同志为核心的党中央坚强领导下，团结带领全区上下完整准确贯彻新时代党的治疆方略，牢牢扭住社会稳定和长治久安总目标，坚持依法治疆、团结稳疆、文化润疆、富民兴疆、长期建疆，推动新疆工作取得了重大成效。党中央决定马兴瑞同志担任自治区党委书记，充分体现了习近平总书记、党中央对新疆工作的关怀和支持。\\n（新疆日报）logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[465,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[465,logseq____&quot;^Flogseq____&quot;,464,536870921]],[logseq____&quot;^15logseq____&quot;,[465,logseq____&quot;^Xlogseq____&quot;,464,536870921]],[logseq____&quot;^15logseq____&quot;,[465,logseq____&quot;^Vlogseq____&quot;,464,536870921]],[logseq____&quot;^15logseq____&quot;,[465,logseq____&quot;^Ulogseq____&quot;,464,536870921]],[logseq____&quot;^15logseq____&quot;,[465,logseq____&quot;^17logseq____&quot;,true,536870921]],[logseq____&quot;^15logseq____&quot;,[465,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u64291a73-39a8-4b40-a9b7-ca84b410a81flogseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[466,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[466,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[466,logseq____&quot;^Flogseq____&quot;,465,536870921]],[logseq____&quot;^15logseq____&quot;,[466,logseq____&quot;^Xlogseq____&quot;,464,536870921]],[logseq____&quot;^15logseq____&quot;,[466,logseq____&quot;^Vlogseq____&quot;,464,536870921]],[logseq____&quot;^15logseq____&quot;,[466,logseq____&quot;^Ulogseq____&q eq____&quot;^Flogseq____&quot;,565,536870921]],[logseq____&quot;^15logseq____&quot;,[566,logseq____&quot;^Xlogseq____&quot;,563,536870921]],[logseq____&quot;^15logseq____&quot;,[566,logseq____&quot;^Vlogseq____&quot;,563,536870921]],[logseq____&quot;^15logseq____&quot;,[566,logseq____&quot;^Ulogseq____&quot;,563,536870921]],[logseq____&quot;^15logseq____&quot;,[566,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^1:logseq____&quot;,1],536870921]],[logseq____&quot;^15logseq____&quot;,[566,logseq____&quot;^Jlogseq____&quot;,[],536870921]],[logseq____&quot;^15logseq____&quot;,[566,logseq____&quot;^17logseq____&quot;,false,536870921]],[logseq____&quot;^15logseq____&quot;,[566,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u64291a74-d971-45ae-a56a-4ad7a05ff2a2logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[567,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;#### [Sahil Bloom](https://threadreaderapp.com/user/SahilBloom)\\n\\n [](https://twitter.com/intent/tweet?in_reply_to=1487436653790695428)[](https://twitter.com/intent/retweet?tweet_id=1487436653790695428 \\logseq____&quot;retweet on twitter\\logseq____&quot;)[](https://twitter.com/intent/like?tweet_id=1487436653790695428 \\logseq____&quot;like on twitter\\logseq____&quot;) [![](https://cubox.pro/c/filters:no_upscale()?imageUrl=https%3A%2F%2Fthreadreaderapp.com%2Fassets%2FTwitter_Logo_Blue.png)](https://twitter.com/SahilBloom/status/1487436653790695428 \\logseq____&quot;read on twitter\\logseq____&quot;) \\n\\n[Jan 29](https://twitter.com/SahilBloom/status/1487436653790695428 \\logseq____&quot;Read on Twitter\\logseq____&quot;) • 32 tweets • 7 min read\\n\\n“Razors” are rules of thumb that simplify decisions.\\n\\nThe most valuable razors I’ve discovered:\\n\\nThe Smart Friends Razor\\n\\nIf your smartest friends are all interested in something, it’s worth paying attention to.\\n\\nIf that something seems crazy, itlogseq____&apos;s worth paying a lot of attention to.\\n\\nThe passions of the smartest people in your circles are a looking glass into the future.\\n\\nThe Rooms Razor\\n\\nIf you have a choice between entering two rooms, choose the room where you are more likely to be the dumbest one in the room.\\n\\nOnce you are in the room, talk less and listen more.\\n\\nBad for your ego, great for your growth.\\n\\nThe Man in the Arena Razor\\n\\nItlogseq____&apos;s easy to throw rocks the sidelines—itlogseq____&apos;s hard to step into the arena.\\n\\nItlogseq____&apos;s lonely and vulnerable, but itlogseq____&apos;s where growth happens.\\n\\nWhen faced with two paths, choose the path that puts you in the arena—choose the path with real skin in the game.\\n\\nThe Feynman Razor\\n\\nComplexity and jargon are often used to mask a lack of deep understanding.\\n\\nIf you can’t explain it to a 5-year-old, you don’t really understand it.\\n\\nIf someone uses a lot of complexity and jargon to explain something to you, they probably don’t understand it.\\n\\nThe Serendipity Razor\\n\\nSome of what we call luck is actually the macro result of 1,000s of micro actions.\\n\\nYour daily habits put you in a position where luck is more likely to strike.\\n\\nWhen choosing between two paths, choose the path that has a larger serendipity surface area.\\n\\nThe Uphill Decision Razor\\n\\nWhen faced with two options, choose the one that’s more difficult in the short-term.\\n\\n[@naval](https://twitter.com/naval) calls this making \\logseq____&quot;uphill decisions”—overriding your biological pain avoidance instinct.\\n\\nItlogseq____&apos;s worth it—short-term pain creates compounding long-term gain.\\n\\nThe Rare Opportunity Razor\\n\\nThere is a rare class of opportunities that the average person will get 0 to 1 chances at in their lifetime.\\n\\nThey look scary, but have insanely asymmetric return profiles.\\n\\nIf you are fortunate to be faced with one of these opportunities, jump at it.\\n\\nThe Buffett Reputation Razor\\n\\n“It takes 20 years to build a reputation and five minutes to ruin it. If you think about that, youlogseq____&apos;ll do things differently.” - Warren Buffett\\n\\nYour reputation is built over decades, but itlogseq____&apos;s made of glass, not stone.\\n\\nRemember that—act accordingly.\\n\\nThe Narrative Fallacy Razor\\n\\nHumans are storytelling creatures—we weave together sequences of events to identify cause-and-effect when the reality is just luck.\\n\\nWhen reading stories of success, itlogseq____&apos;s fair to assume they downplay the role of luck as a contributing factor.\\n\\nThe Time Billionaire Razor\\n\\nTime is our most precious asset.\\n\\nWhen choosing between two paths, choose the path that places the highest appreciation on the value of your time.\\n\\nThis is not about money—itlogseq____&apos;s about leverage.\\n\\nThe path where you spend more time in your Zone of Genius.\\n\\nThe Opinion Razor\\n\\n\\logseq____&quot;I never allow myself to have an opinion on anything that I don’t know the other side’s argument better than they do.\\logseq____&quot; - Charlie Munger\\n\\nOpinions are earned, not owed.\\n\\nIf you canlogseq____&apos;t state state the oppositionlogseq____&apos;s argument clearly, you havenlogseq____&apos;t earned an opinion.\\n\\nThe Worrying Razor\\n\\nIf someone says \\logseq____&quot;donlogseq____&apos;t worry about it”—you should probably worry about it.\\n\\nIf you ask a question and the response involves an elevated voice, hand-waving, or scoffing—you should probably dig deeper on it.\\n\\n\\logseq____&quot;The lady doth protest too much, methinks.\\logseq____&quot;\\n\\nThe Boasters Razor\\n\\nTruly successful people rarely feel the need to boast about their success.\\n\\nIf someone regularly boasts about their income, wealth, or success, it’s fair to assume the reality is a small fraction of what they claim.\\n\\nNewton’s Flaming Laser Sword\\n\\nIf something cannot be settled by experiment or observation, it is not worth debating.\\n\\nThis will save you from wasting a lot of time on pointless arguments—on the internet and in real life.\\n\\nHitchens’ Razor\\n\\nWhat can be asserted without evidence can also be dismissed without evidence.\\n\\nThe burden of proof regarding a claim lies with the one who makes the claim.\\n\\nIf unmet, no argument is required to dismiss it.\\n\\nThe Grit Razor\\n\\nIf forced to choose between two people of equal merit, choose the one that has been punched in the face.\\n\\nThe one who has been punched—metaphorically or literally—is likely to have true grit.\\n\\nApplies to investing (founders), hiring (candidates), and more.\\n\\nThe \\logseq____&quot;Look the Part\\logseq____&quot; Razor\\n\\nIf forced to choose between two options of seemingly equal merit, choose the one that doesn’t look the part.\\n\\nThe one who doesn’t look the part has had to overcome much more to achieve its status than the one who fit in perfectly.\\n\\nh/t [@nntaleb](https://twitter.com/nntaleb)\\n\\nHanlon’s Razor\\n\\nNever attribute to malice that which can be adequately explained by stupidity.\\n\\nIn assessing someonelogseq____&apos;s actions, we should not assume negative intent if there is a viable alternative explanation—different beliefs, lack of intelligence, incompetence, or ignorance.\\n\\nThe Optimist Razor\\n\\nWhen choosing who to spend time with, prioritize spending more time with optimists.\\n\\nPessimists see the doors that are closed. Optimists see the doors that are open—and probably kick down the closed doors.\\n\\nRemember: Pessimists sound smart, optimists get rich.\\n\\nThe Pygmalion Razor\\n\\nThe Pygmalion Effect says that high expectations lead to high performance (and vice versa).\\n\\nWhen working with new people and teams, choose to see each individual as their highest potential self—they will begin to achieve more.\\n\\nh/t [@KatColeATL](https://twitter.com/KatColeATL)\\n\\nThe \\logseq____&quot;What Stays the Same\\logseq____&quot; Razor\\n\\nItlogseq____&apos;s difficult to predict the future.\\n\\nJeff Bezos famously said that investing in what might change is risky, but investing in what will remain constant is safe.\\n\\nWhen building for the future, focus on the constants—focus on what stays the same.\\n\\nThe Crazy Idea Razor\\n\\nIf someone proposes a seemingly crazy idea:\\n\\n(1) Are they a domain expert?-\\n(2) Are they reasonable?\\n\\nIf yes on (1) and (2), you should take the idea seriously, as it may be an asymmetric bet on the future.\\n\\nh/t [@paulg](https://twitter.com/paulg)\\n\\nThose are 20+ of the most valuable razors I’ve discovered.\\n\\nFollow me [@SahilBloom](https://twitter.com/SahilBloom) for more threads on growth, business, and decision-making.\\n\\nI will write a deep-dive on these razors in my newsletter. Join 66,000+ others and subscribe so you don’t miss it!\\n\\n [![](https://cubox.pro/c/filters:no_upscale()?imageUrl=https%3A%2F%2Fcdn.substack.com%2Fimage%2Ffetch%2Fw_1128%2Ch_564%2Cc_fill%2Cf_jpg%2Cq_auto%3Abest%2Cfl_progressive%3Asteep%2Fhttps%253A%252F%252Fsahilbloom.substack.com%252Ftwitter%252Fsubscribe-card.svg%253Fv%253D30f9955b5dd05a783700fc252eeeb6f4%253Fversion%253D3)](https://sahilbloom.substack.com/) \\n\\n[**The Curiosity Chronicle** Delivering curiosity-inducing content every single week. Click to read The Curiosity Chronicle, by Sahil Bloom, a Substack publication with tens of thousands of readers.](https://sahilbloom.substack.com/) [https://sahilbloom.substack.com](https://sahilbloom.substack.com/)\\n\\nAnd be sure to check out my new podcast—Where It Happens—for deep dives with amazing guests on many of these razors, frameworks, and more.\\n\\n [![](https://cubox.pro/c/filters:no_upscale()?imageUrl=https%3A%2F%2Fis1-ssl.mzstatic.com%2Fimage%2Fthumb%2FPodcasts116%2Fv4%2F1a%2F3e%2Fa8%2F1a3ea8a1-5ce8-441d-d5b8-19a4bb07a6b2%2Fmza_11835511280012671162.jpeg%2F1200x630wp.png)](https://podcasts.apple.com/us/podcast/where-it-happens/id1593424985) \\n\\n[**‎Where I 6870921]],[logseq____&quot;^15logseq____&quot;,[795,logseq____&quot;^Flogseq____&quot;,796,536870921]],[logseq____&quot;^15logseq____&quot;,[795,logseq____&quot;^Xlogseq____&quot;,774,536870921]],[logseq____&quot;^15logseq____&quot;,[795,logseq____&quot;^Vlogseq____&quot;,793,536870921]],[logseq____&quot;^15logseq____&quot;,[795,logseq____&quot;^Ulogseq____&quot;,774,536870921]],[logseq____&quot;^15logseq____&quot;,[795,logseq____&quot;^17logseq____&quot;,true,536870921]],[logseq____&quot;^15logseq____&quot;,[795,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u64291a74-06fa-4936-bb78-bcba6ac5ccd7logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;量子理论就是这样的理论。而我们借助来理解真实世界结构的另外三大解释，从量子物理角度看来都是“高层级”理论。它们是进化论（主要是生物有机体的进化）、认识论（关于知识的理论）和计算理论（关于计算机以及理论上什么可计算、什么不可计算的理论）。在本书中我将指出，这4个表面看来完全无关的学科，其基本原理之间却有着非常深刻多样的联系，以至于要想最充分地理解其中任何一个理论，都必须理解其他3个理论。这四大理论共同形成一个紧密一致的解释结构，其影响如此深远，如此广泛地涵盖我们对这个世界的理解，以至于在我看来，已经完全可以称之为第一个真正的“万有之理” (Page 550)logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^Flogseq____&quot;,783,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^Xlogseq____&quot;,774,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^Vlogseq____&quot;,793,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^Ulogseq____&quot;,774,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^17logseq____&quot;,true,536870921]],[logseq____&quot;^15logseq____&quot;,[796,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u64291a74-b636-45ac-9650-ab1f1de71e95logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[797,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;[2]。唯一的途径是进化，或试错法，尤其是那种目标明确的试错法，即科学发现。 (Page 1078)logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;       // This script checks to see if a redirect is present in the query string

      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.

      // the single page app to route accordingly.
