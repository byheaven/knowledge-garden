t;^1?&quot;,[423,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[423,&quot;^K&quot;,212,536870916]],[&quot;^1?&quot;,[423,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,0,&quot;^1O&quot;,2],536870916]],[&quot;^1?&quot;,[423,&quot;^15&quot;,212,536870916]],[&quot;^1?&quot;,[423,&quot;^11&quot;,212,536870916]],[&quot;^1?&quot;,[423,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[423,&quot;^?&quot;,&quot;~u620b979e-fa77-44fc-b8e5-3ea01283e4fe&quot;,536870916]],[&quot;^1?&quot;,[424,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[424,&quot;^Y&quot;,&quot;Tokens are to the Web3 what websites were to the Web1. With thee mergence  of  the  WWW in  1991,  Tim  Berner Lee  introduced a  new standard that allowed us to create visually appealing web pages with just a few lines of code, and surf the Internet following links, instead of using command-line interfaces. Back  in  the  early  1990s, most  people did  not know how to code HTML, or how to create appealing, meaningful, user-friendly websites.  It  took  us  almost a  decade to  figure  out  how  to  use webpages beyond the scope of online directories and online billboards, and when we did, the Web2 emerged. Compared to those early days of the Web, we are at a very similar stage when it comes to understanding what we can potentially do  with  cryptographic  tokens. While it  has  become  easy  to create a token with a few lines of code, the understanding of how to apply these tokens is still vague.\\nhl-page:: 15\\nls-type:: annotation\\nid:: 61e0dcd8-a721-45bd-9a5e-86e5e89b79c9&quot;,536870916]],[&quot;^1?&quot;,[424,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[424,&quot;^K&quot;,423,536870916]],[&quot;^1?&quot;,[424,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,2,&quot;^1O&quot;,998],536870916]],[&quot;^1?&quot;,[424,&quot;^15&quot;,212,536870916]],[&quot;^1?&quot;,[424,&quot;^11&quot;,212,53 t;,4,&quot;^1S&quot;,&quot;61e62271-caf7-45ca-9dfc-ad37ce1ab7b4&quot;,&quot;^26&quot;,&quot;2.6&quot;,&quot;^28&quot;,&quot;2022-01-18T02:31:02.955Z&quot;],536870916]],[&quot;^1?&quot;,[428,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^29&quot;,&quot;^25&quot;,&quot;^23&quot;,&quot;^27&quot;,&quot;^22&quot;,&quot;^24&quot;,&quot;^1S&quot;,&quot;^26&quot;,&quot;^28&quot;]],536870916]],[&quot;^1?&quot;,[428,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[428,&quot;^?&quot;,&quot;~u61e62271-caf7-45ca-9dfc-ad37ce1ab7b4&quot;,536870916]],[&quot;^1?&quot;,[429,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[429,&quot;^Y&quot;,&quot;The blockreward gets reduced by 50 percent every 210,000 blocks, around every fouryears. The next “halving” of block rewards is in 2024.\\nls-type:: annotation\\nhl-page:: 55\\nid:: 61ea187c-f3d9-43c7-bf5c-a427f5e78de3&quot;,536870916]],[&quot;^1?&quot;,[429,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[429,&quot;^K&quot;,427,536870916]],[&quot;^1?&quot;,[429,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,2478,&quot;^1O&quot;,2703],536870916]],[&quot;^1?&quot;,[429,&quot;^15&quot;,212,536870916]],[&quot;^1?&quot;,[429,&quot;^11&quot;,212,536870916]],[&quot;^1?&quot;,[429,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,55,&quot;^1S&quot;,&quot;61ea187c-f3d9-43c7-bf5c-a427f5e78de3&quot;],536870916]],[&quot;^1?&quot;,[429,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[429,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[429,&quot;^?&quot;,&quot;~u61ea187c-f3d9-43c7-bf5c-a427f5e78de3&quot;,536870916]],[&quot;^1?&quot;,[430,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[430,&quot;^Y&quot;,&quot;Furthermore, alternative distributed  ledger systems have  emerged with completely different types of consensus mechanisms, such as directed acyclic graphs (DAGs) that do not require the creation of a chain of blocks anymore, and instead use alternative cryptoeconomic mechanisms to reach consensus. Examples of networks that use DAGs as a consensus mechanism are “IOTA,” “Byteball,” or “Nano.”\\nhl-page:: 71\\nls-type:: annotation\\nid:: 61ef6564-8736-4444-af48-f86682cf37d9&quot;,536870916]],[&quot;^1?&quot;,[430,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[430,&quot;^K&quot;,429,536870916]],[&quot;^1?&quot;,[430,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,2703,&quot;^1O&quot;,3193],536870916]],[&quot;^1?&quot;,[430,&quot;^15&quot;,212,536870916]],[&quot;^1?&quot;,[430,&quot;^11&quot;,212,536870916]],[&quot;^1?&quot;,[430,&quot;^D&quot;,[&quot;^ &quot;,&quot;^23&quot;,71,&quot;^22&quot;,&quot;annotation&quot;,&quot;^1S&quot;,&quot;61ef6564-8736-4444-af48-f86682cf37d9&quot;],536870916]],[&quot;^1?&quot;,[430,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^23&quot;,&quot;^22&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[430,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[430,&quot;^?&quot;,&quot;~u61ef6564-8736-4444-af48-f86682cf37d9&quot;,536870916]],[&quot;^1?&quot;,[431,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[431,&quot;^Y&quot;,&quot;&quot;,536870916]],[&quot;^1?&quot;,[431,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[431,&quot;^K&quot;,151,536870916]],[&quot;^1?&quot;,[431,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,0,&quot;^1O&quot;,2],536870916]],[&quot;^1?&quot;,[431,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[431,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[431,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[431,&quot;^?&quot;,&quot;~u620b979e-8349-4e9b-ad60-b0c6703f0d0a&quot;,536870916]],[&quot;^1?&quot;,[432,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[432,&quot;^Y&quot;,&quot;从计算机科学的角度来看，以太坊是一个具备确定性但实际上却没有边际的状态机。它有两个特点：具有一个全球范围可访问的单体状态；还有一个执行状态更改的虚拟机。\\nls-type:: annotation\\nhl-page:: 48\\nid:: 61e14bee-935a-4beb-b244-faead32b467c&quot;,536870916]],[&quot;^1?&quot;,[432,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[432,&quot;^K&quot;,431,536870916]],[&quot;^1?&quot;,[432,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,2,&quot;^1O&quot;,315],536870916]],[&quot;^1?&quot;,[432,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[432,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[432,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,48,&quot;^1S&quot;,&quot;61e14bee-935a-4beb-b244-faead32b467c&quot;],536870916]],[&quot;^1?&quot;,[432,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[432,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[432,&quot;^?&quot;,&quot;~u61e14bee-935a-4beb-b244-faead32b467c&quot;,536870916]],[&quot;^1?&quot;,[433,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[433,&quot;^Y&quot;,&quot;从更加实际的角度来看，以太坊是一个开源的、全球去中心化的计算基础架构，可以执行称为智能合约的程序。它使用区块链同步和保存系统状态，借助以太币这种数字货币来计量并控制程序执行的资源开销。\\nls-type:: annotation\\nhl-page:: 49\\nid:: 61e14bf8-8c8e-41f4-9b1d-f04bb7fbf38a&quot;,536870916]],[&quot;^1?&quot;,[433,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[433,&quot;^K&quot;,432,536870916]],[&quot;^1?&quot;,[433,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,315,&quot;^1O&quot;,676],536870916]],[&quot;^1?&quot;,[433,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[433,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[433,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,49,&quot;^1S&quot;,&quot;61e14bf8-8c8e-41f4-9b1d-f04bb7fbf38a&quot;],536870916]],[&quot;^1?&quot;,[433,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[433,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[433,&quot;^?&quot;,&quot;~u61e14bf8-8c8e-41f4-9b1d-f04bb7fbf38a&quot;,536870916]],[&quot;^1?&quot;,[434,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[434,&quot;^Y&quot;,&quot;以太坊平台使得开发者可以构建强大的去中心化应用，并且内建了经济性的功能。在提供高可用性、可审计性、透明和中立等特性的同时，减少或消除了审查、第三方介入和对手方风险。\\nls-type:: annotation\\nhl-page:: 49\\nid:: 61e14c22-56b1-42e0-a078-76c32b40d4d5&quot;,536870916]],[&quot;^1?&quot;,[434,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[434,&quot;^K&quot;,433,536870916]],[&quot;^1?&quot;,[434,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,676,&quot;^1O&quot;,1007],536870916]],[&quot;^1?&quot;,[434,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[434,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[434,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,49,&quot;^1S&quot;,&quot;61e14c22-56b1-42e0-a078-76c32b40d4d5&quot;],536870916]],[&quot;^1?&quot;,[434,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[434,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[434,&quot;^?&quot;,&quot;~u61e14c22-56b1-42e0-a078-76c32b40d4d5&quot;,536870916]],[&quot;^1?&quot;,[435,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[435,&quot;^Y&quot;,&quot;有些人把以太坊看作一个可编程的数字货币平台，基于区块链的合约，根据事先约定的规则持有和转移数字资产，为了改变这种看法，Gavin起了很大作用，他使人们相信以太坊将是一个通用目的的计算平台。这起源于一些关注点和术语的微妙变化，稍后随着“Web 3”概念的深入人心而更具影响力。Web 3把以太坊视为去中心化技术的一部分，去中心化技术的另外两个重要组成部分是Whisper和Swarm。\\nls-type:: annotation\\nhl-page:: 52\\nid:: 61e14e75-1283-4483-8138-446d5c8923c7&quot;,536870916]],[&quot;^1?&quot;,[435,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[435,&quot;^K&quot;,434,536870916]],[&quot;^1?&quot;,[435,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,1007,&quot;^1O&quot;,1611],536870916]],[&quot;^1?&quot;,[435,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[435,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[435,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,52,&quot;^1S&quot;,&quot;61e14e75-1283-4483-8138-446d5c8923c7&quot;],536870916]],[&quot;^1?&quot;,[435,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[435,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[435,&quot;^?&quot;,&quot;~u61e14e75-1283-4483-8138-446d5c8923c7&quot;,536870916]],[&quot;^1?&quot;,[436,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[436,&quot;^Y&quot;,&quot;2015年7月30日，第一个以太坊区块被挖矿成功。“世界计算机”开始为全世界提供服务。\\nls-type:: annotation\\nhl-page:: 53\\nid:: 61e14ed4-5a34-4163-9a52-f44580ad1f8e&quot;,536870916]],[&quot;^1?&quot;,[436,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[436,&quot;^K&quot;,435,536870916]],[&quot;^1?&quot;,[436,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,1611,&quot;^1O&quot;,1811],536870916]],[&quot;^1?&quot;,[436,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[436,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[436,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,53,&quot;^1S&quot;,&quot;61e14ed4-5a34-4163-9a52-f44580ad1f8e&quot;],536870916]],[&quot;^1?&quot;,[436,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[436,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[436,&quot;^?&quot;,&quot;~u61e14ed4-5a34-4163-9a52-f44580ad1f8e&quot;,536870916]],[&quot;^1?&quot;,[437,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[437,&quot;^Y&quot;,&quot;以太坊相比通用计算机的两个主要差异体现在：状态转换是由共识规则所控制的，状态是全局分布在一个共享的账本之上。如果能够基于共识规则来创建一台全局计算机，那么可以追踪任何复杂的状态变化并对状态机进行编程，这会带来什么？以太坊对这个问题提出了它的答案。\\nls-type:: annotation\\nhl-page:: 55\\nid:: 61e152b4-92c3-4b7f-a9dd-5def50e0196c&quot;,536870916]],[&quot;^1?&quot;,[437,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[437,&quot;^K&quot;,436,536870916]],[&quot;^1?&quot;,[437,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,1811,&quot;^1O&quot;,2265],536870916]],[&quot;^1?&quot;,[437,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[437,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[437,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,55,&quot;^1S&quot;,&quot;61e152b4-92c3-4b7f-a9dd-5def50e0196c&quot;],536870916]],[&quot;^1?&quot;,[437,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[437,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[437,&quot;^?&quot;,&quot;~u61e152b4-92c3-4b7f-a9dd-5def50e0196c&quot;,536870916]],[&quot;^1?&quot;,[438,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[438,&quot;^Y&quot;,&quot;以太坊的状态转换由以太坊虚拟机（EVM）处理，这是一个基于栈的虚拟机，执行bytecode（字节码指令）。被称为“智能合约”的EVM程序采用高级语言（例如Solidity）编写，并编译为通过EVM执行的字节码。\\nls-type:: annotation\\nhl-page:: 56\\nid:: 61e15330-e021-45c8-82db-97aa10ea1318&quot;,536870916]],[&quot;^1?&quot;,[438,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[438,&quot;^K&quot;,437,536870916]],[&quot;^1?&quot;,[438,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,2265,&quot;^1O&quot;,2615],536870916]],[&quot;^1?&quot;,[438,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[438,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[438,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,56,&quot;^1S&quot;,&quot;61e15330-e021-45c8-82db-97aa10ea1318&quot;],536870916]],[&quot;^1?&quot;,[438,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[438,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[438,&quot;^?&quot;,&quot;~u61e15330-e021-45c8-82db-97aa10ea1318&quot;,536870916]],[&quot;^1?&quot;,[439,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[439,&quot;^Y&quot;,&quot;以太坊的突破性创新在于，它把存储程序计算机这样的通用目的计算架构与去中心化区块链相结合，因此创建了一个分布式的单体状态世界计算机。无论以太坊的程序运行在任何地方，都能够产生一致的共识状态，通过共识规则确保安全。\\nls-type:: annotation\\nhl-page:: 58\\nid:: 61e15421-a93a-42fb-b5a7-09cf9c186b3e&quot;,536870916]],[&quot;^1?&quot;,[439,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[439,&quot;^K&quot;,438,536870916]],[&quot;^1?&quot;,[439,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,2615,&quot;^1O&quot;,3015],536870916]],[&quot;^1?&quot;,[439,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[439,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[439,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,58,&quot;^1S&quot;,&quot;61e15421-a93a-42fb-b5a7-09cf9c186b3e&quot;],536870916]],[&quot;^1?&quot;,[439,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[439,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[439,&quot;^?&quot;,&quot;~u61e15421-a93a-42fb-b5a7-09cf9c186b3e&quot;,536870916]],[&quot;^1?&quot;,[440,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[440,&quot;^Y&quot;,&quot;为了应对这个挑战，以太坊引入了名为gas的计量机制。EVM在执行智能合约时，它会仔细地计算每一个执行指令（计算量、数据访问，等等）。每一个指令都有一个预先定义好的开销，以gas为单位。当以太坊交易触发了智能合约的执行时，交易中必须包含这个智能合约执行过程中所需要的计算资源开销的上限。如果执行过程中的资源开销量超过了交易中指定的gas上限，那么EVM就会主动终止这个合约的执行。以太坊通过gas机制，在保证图灵完备计算的同时，限制了程序可以使用的资源量。\\nls-type:: annotation\\nhl-page:: 60\\nid:: 61e1550d-1773-4e0c-b5e6-a0d3e59aba3f&quot;,536870916]],[&quot;^1?&quot;,[440,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[440,&quot;^K&quot;,439,536870916]],[&quot;^1?&quot;,[440,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,3015,&quot;^1O&quot;,3745],536870916]],[&quot;^1?&quot;,[440,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[440,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[440,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,60,&quot;^1S&quot;,&quot;61e1550d-1773-4e0c-b5e6-a0d3e59aba3f&quot;],536870916]],[&quot;^1?&quot;,[440,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[440,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[440,&quot;^?&quot;,&quot;~u61e1550d-1773-4e0c-b5e6-a0d3e59aba3f&quot;,536870916]],[&quot;^1?&quot;,[441,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[441,&quot;^Y&quot;,&quot;相比之下，在以太坊的世界中，开发文化更着眼于未来，对应的又号是：move fast and break things。如果需要一项更改，就实现它，即使这意味着废弃之前的假设、破坏兼容性，或者导致客户端被迫更新。以太坊开发文化的特点是快速创新、快速变革，敢于进行前瞻性实验，即使牺牲后向兼容性也在所不惜。对于开发者而言，这意味着你需要保持一定的灵活度，当底层的假设改变时，准备好重新构建基础架构。以太坊开发者所面对的最大挑战是，把自己的代码部署到不可变的系统上，还是部署到不断发展和演化的平台上，这是一对固有的矛盾。仅仅“升级”智能合约是不够的。你必须准备好重新部署，还要迁移用户、应用和资金，全部重新开始。\\nls-type:: annotation\\nhl-page:: 62\\nid:: 61e697f6-1c6e-4617-8e75-29580bc89226&quot;,536870916]],[&quot;^1?&quot;,[441,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[441,&quot;^K&quot;,440,536870916]],[&quot;^1?&quot;,[441,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,3745,&quot;^1O&quot;,4687],536870916]],[&quot;^1?&quot;,[441,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[441,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[441,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,62,&quot;^1S&quot;,&quot;61e697f6-1c6e-4617-8e75-29580bc89226&quot;],536870916]],[&quot;^1?&quot;,[441,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[441,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[441,&quot;^?&quot;,&quot;~u61e697f6-1c6e-4617-8e75-29580bc89226&quot;,536870916]],[&quot;^1?&quot;,[442,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[442,&quot;^Y&quot;,&quot;以太币可以被拆分为更小的单元，我们把最小的单元称为wei。一个以太币相当于$10^{18}$个wei。\\nhl-page:: 64\\nls-type:: annotation\\nid:: 61e698b2-6439-458c-a8c8-6a2fc1d76ff6&quot;,536870916]],[&quot;^1?&quot;,[442,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[442,&quot;^K&quot;,441,536870916]],[&quot;^1?&quot;,[442,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,4687,&quot;^1O&quot;,4895],536870916]],[&quot;^1?&quot;,[442,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[442,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[442,&quot;^D&quot;,[&quot;^ &quot;,&quot;^23&quot;,64,&quot;^22&quot;,&quot;annotation&quot;,&quot;^1S&quot;,&quot;61e698b2-6439-458c-a8c8-6a2fc1d76ff6&quot;],536870916]],[&quot;^1?&quot;,[442,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^23&quot;,&quot;^22&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[442,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[442,&quot;^?&quot;,&quot;~u61e698b2-6439-458c-a8c8-6a2fc1d76ff6&quot;,536870916]],[&quot;^1?&quot;,[443,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[443,&quot;^Y&quot;,&quot;在MetaMask钱包中创建的账户类型称为外部账户（EOA）。外部账户是拥有私钥的账户，拥有私钥意味着控制对以太币或合约的访问。现在，你可能猜测还有其他类型的账户。另一种账户是合约账户。合约账户具有智能合约代码，而外部账户不具有。此外，合约账户没有私钥。相反，它由其智能合约代码的逻辑所拥有（并受其控制）。智能合约代码是在合约账户创建时由以太坊区块链记录的软件程序，由EVM执行。合约具有地址，就像外部账户一样。合约也可以发送和接收以太币。但是，当交易目标是合约地址时，它会导致该合同在EVM中运行，使用交易和交易的数据作为其输入。除了以太币之外，交易还可以包含指示合约中要运行的特定函数以及要传递给该函数参数的数据。通过这种方式，交易可以调用合约中的函数。请注意，由于合约账户没有私钥，因此无法启动交易。只有外部账户才能启动交易，但合约可以通过调用其他合约，构建复杂的执行路径来对交易做出反应。这种情况的一个典型用途是外部账户向多重签名智能合约钱包发送请求交易，将一些以太币发送到另一个地址。典型的DApp编程模式是让合约A调用合约B，以便在合约A的用户之间维持共享状态。\\nls-type:: annotation\\nhl-page:: 82\\nid:: 61ea8e5a-3452-4317-8672-b7714433c2e7&quot;,536870916]],[&quot;^1?&quot;,[443,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[443,&quot;^K&quot;,442,536870916]],[&quot;^1?&quot;,[443,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,4895,&quot;^1O&quot;,6393],536870916]],[&quot;^1?&quot;,[443,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[443,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[443,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,82,&quot;^1S&quot;,&quot;61ea8e5a-3452-4317-8672-b7714433c2e7&quot;],536870916]],[&quot;^1?&quot;,[443,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[443,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[443,&quot;^?&quot;,&quot;~u61ea8e5a-3452-4317-8672-b7714433c2e7&quot;,536870916]],[&quot;^1?&quot;,[444,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[444,&quot;^Y&quot;,&quot;拥有标准协议的好处是存在多个独立开发但又可以互相交互的以太坊客户端。以太坊网络所运行的客户端的多样性比任何其他区块链都多，这也普遍被认为是一个优点。实际上，拥有多个独立开发的客户端，已被证明是防御网络攻击的绝佳方法，因为特定客户端实现策略的漏洞只会影响到那些要修补漏洞的开发者，别的客户端可以保证整个网络几乎不受影响地继续运行。\\nls-type:: annotation\\nhl-page:: 102\\nid:: 61ee7d13-dda6-4d9e-bee1-fdfff30831d6&quot;,536870916]],[&quot;^1?&quot;,[444,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[444,&quot;^K&quot;,443,536870916]],[&quot;^1?&quot;,[444,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,6393,&quot;^1O&quot;,6970],536870916]],[&quot;^1?&quot;,[444,&quot;^15&quot;,151,536870916]],[&quot;^1?&quot;,[444,&quot;^11&quot;,151,536870916]],[&quot;^1?&quot;,[444,&quot;^D&quot;,[&quot;^ &quot;,&quot;^22&quot;,&quot;annotation&quot;,&quot;^23&quot;,102,&quot;^1S&quot;,&quot;61ee7d13-dda6-4d9e-bee1-fdfff30831d6&quot;],536870916]],[&quot;^1?&quot;,[444,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^22&quot;,&quot;^23&quot;,&quot;^1S&quot;]],536870916]],[&quot;^1?&quot;,[444,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[444,&quot;^?&quot;,&quot;~u61ee7d13-dda6-4d9e-bee1-fdfff30831d6&quot;,536870916]],[&quot;^1?&quot;,[445,&quot;^Y&quot;,&quot;public:: true\\n\\n&quot;,536870916]],[&quot;^1?&quot;,[445,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[445,&quot;^K&quot;,177,536870916]],[&quot;^1?&quot;,[445,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1N&quot;,0,&quot;^1O&quot;,15],536870916]],[&quot;^1?&quot;,[445,&quot;^15&quot;,177,536870916]],[&quot;^1?&quot;,[445,&quot;^11&quot;,177,536870916]],[&quot;^1?&quot;,[445,&quot;^=&quot;,true,536870916]],[&qu quot;,15],536870916]],[&quot;^1?&quot;,[602,&quot;^15&quot;,230,536870916]],[&quot;^1?&quot;,[602,&quot;^11&quot;,230,536870916]],[&quot;^1?&quot;,[602,&quot;^10&quot;,203,536870916]],[&quot;^1?&quot;,[602,&quot;^=&quot;,true,536870916]],[&quot;^1?&quot;,[602,&quot;^D&quot;,[&quot;^ &quot;,&quot;^1C&quot;,[&quot;^1E&quot;,[&quot;razor&quot;]]],536870916]],[&quot;^1?&quot;,[602,&quot;^P&quot;,[&quot;^1&gt;&quot;,[&quot;^1C&quot;]],536870916]],[&quot;^1?&quot;,[602,&quot;^L&quot;,203,536870916]],[&quot;^1?&quot;,[602,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[602,&quot;^?&quot;,&quot;~u620b979f-8a3b-4225-80e5-15e57c6b33d3&quot;,536870916]],[&quot;^1?&quot;,[603,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[603,&quot;^Y&quot;,&quot;# He’s also an avid crypto trader with the scars to prove it!\\n\\n[threadreaderapp.com](https://threadreaderapp.com/thread/1487436653790695428.html)\\n\\n510 views\\n\\n![](https://cubox.pro/c/filters:no_upscale()?imageUrl=https%3A%2F%2Fpbs.twimg.com%2Fprofile_images%2F1462779172451983370%2FxAsgPikz_bigger.jpg)&quot;,536870916]],[&quot;^1?&quot;,[603,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[603,&quot;^12&quot;,1,536870916]],[&quot;^1?&quot;,[603,&quot;^K&quot;,602,536870916]],[&quot;^1?&quot;,[603,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,15,&quot;^1O&quot;,319],536870916]],[&quot;^1?&quot;,[603,&quot;^15&quot;,230,536870916]],[&quot;^1?&quot;,[603,&quot;^11&quot;,230,536870916]],[&quot;^1?&quot;,[603,&quot;^1P&quot;,1,536870916]],[&quot;^1?&quot;,[603,&quot;^13&quot;,&quot;^1Q&quot;,536870916]],[&quot;^1?&quot;,[603,&quot;^1R&quot;,false,536870916]],[&quot;^1?&quot;,[603,&quot;^?&quot;,&quot;~u620b979f-de8b-43f2-a7cf-0a3210b2aa81&quot;,536870916]],[&quot;^1?&quot;,[604,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[604,&quot;^Y&quot;,&quot;#### [Sahil Bloom](https://threadreaderapp.com/user/SahilBloom)\\n\\n [](https://twitter.com/intent/tweet?in_reply_to=1487436653790695428)[](https://twitter.com/intent/retweet?tweet_id=1487436653790695428 \\&quot;retweet on twitter\\&quot;)[](https://twitter.com/intent/like?tweet_id=1487436653790695428 \\&quot;like on twitter\\&quot;) [![](https://cubox.pro/c/filters:no_upscale()?imageUrl=https%3A%2F%2Fthreadreaderapp.com%2Fassets%2FTwitter_Logo_Blue.png)](https://twitter.com/SahilBloom/status/1487436653790695428 \\&quot;read on twitter\\&quot;) \\n\\n[Jan 29](https://twitter.com/SahilBloom/status/1487436653790695428 \\&quot;Read on Twitter\\&quot;) • 32 tweets • 7 min read\\n\\n“Razors” are rules of thumb that simplify decisions.\\n\\nThe most valuable razors I’ve discovered:\\n\\nThe Smart Friends Razor\\n\\nIf your smartest friends are all interested in something, it’s worth paying attention to.\\n\\nIf that something seems crazy, it&apos;s worth paying a lot of attention to.\\n\\nThe passions of the smartest people in your circles are a looking glass into the future.\\n\\nThe Rooms Razor\\n\\nIf you have a choice between entering two rooms, choose the room where you are more likely to be the dumbest one in the room.\\n\\nOnce you are in the room, talk less and listen more.\\n\\nBad for your ego, great for your growth.\\n\\nThe Man in the Arena Razor\\n\\nIt&apos;s easy to throw rocks the sidelines—it&apos;s hard to step into the arena.\\n\\nIt&apos;s lonely and vulnerable, but it&apos;s where growth happens.\\n\\nWhen faced with two paths, choose the path that puts you in the arena—choose the path with real skin in the game.\\n\\nThe Feynman Razor\\n\\nComplexity and jargon are often used to mask a lack of deep understanding.\\n\\nIf you can’t explain it to a 5-year-old, you don’t really understand it.\\n\\nIf someone uses a lot of complexity and jargon to explain something to you, they probably don’t understand it.\\n\\nThe Serendipity Razor\\n\\nSome of what we call luck is actually the macro result of 1,000s of micro actions.\\n\\nYour daily habits put you in a position where luck is more likely to strike.\\n\\nWhen choosing between two paths, choose the path that has a larger serendipity surface area.\\n\\nThe Uphill Decision Razor\\n\\nWhen faced with two options, choose the one that’s more difficult in the short-term.\\n\\n[@naval](https://twitter.com/naval) calls this making \\&quot;uphill decisions”—overriding your biological pain avoidance instinct.\\n\\nIt&apos;s worth it—short-term pain creates compounding long-term gain.\\n\\nThe Rare Opportunity Razor\\n\\nThere is a rare class of opportunities that the average person will get 0 to 1 chances at in their lifetime.\\n\\nThey look scary, but have insanely asymmetric return profiles.\\n\\nIf you are fortunate to be faced with one of these opportunities, jump at it.\\n\\nThe Buffett Reputation Razor\\n\\n“It takes 20 years to build a reputation and five minutes to ruin it. If you think about that, you&apos;ll do things differently.” - Warren Buffett\\n\\nYour reputation is built over decades, but it&apos;s made of glass, not stone.\\n\\nRemember that—act accordingly.\\n\\nThe Narrative Fallacy Razor\\n\\nHumans are storytelling creatures—we weave together sequences of events to identify cause-and-effect when the reality is just luck.\\n\\nWhen reading stories of success, it&apos;s fair to assume they downplay the role of luck as a contributing factor.\\n\\nThe Time Billionaire Razor\\n\\nTime is our most precious asset.\\n\\nWhen choosing between two paths, choose the path that places the highest appreciation on the value of your time.\\n\\nThis is not about money—it&apos;s about leverage.\\n\\nThe path where you spend more time in your Zone of Genius.\\n\\nThe Opinion Razor\\n\\n\\&quot;I never allow myself to have an opinion on anything that I don’t know the other side’s argument better than they do.\\&quot; - Charlie Munger\\n\\nOpinions are earned, not owed.\\n\\nIf you can&apos;t state state the opposition&apos;s argument clearly, you haven&apos;t earned an opinion.\\n\\nThe Worrying Razor\\n\\nIf someone says \\&quot;don&apos;t worry about it”—you should probably worry about it.\\n\\nIf you ask a question and the response involves an elevated voice, hand-waving, or scoffing—you should probably dig deeper on it.\\n\\n\\&quot;The lady doth protest too much, methinks.\\&quot;\\n\\nThe Boasters Razor\\n\\nTruly successful people rarely feel the need to boast about their success.\\n\\nIf someone regularly boasts about their income, wealth, or success, it’s fair to assume the reality is a small fraction of what they claim.\\n\\nNewton’s Flaming Laser Sword\\n\\nIf something cannot be settled by experiment or observation, it is not worth debating.\\n\\nThis will save you from wasting a lot of time on pointless arguments—on the internet and in real life.\\n\\nHitchens’ Razor\\n\\nWhat can be asserted without evidence can also be dismissed without evidence.\\n\\nThe burden of proof regarding a claim lies with the one who makes the claim.\\n\\nIf unmet, no argument is required to dismiss it.\\n\\nThe Grit Razor\\n\\nIf forced to choose between two people of equal merit, choose the one that has been punched in the face.\\n\\nThe one who has been punched—metaphorically or literally—is likely to have true grit.\\n\\nApplies to investing (founders), hiring (candidates), and more.\\n\\nThe \\&quot;Look the Part\\&quot; Razor\\n\\nIf forced to choose between two options of seemingly equal merit, choose the one that doesn’t look the part.\\n\\nThe one who doesn’t look the part has had to overcome much more to achieve its status than the one who fit in perfectly.\\n\\nh/t [@nntaleb](https://twitter.com/nntaleb)\\n\\nHanlon’s Razor\\n\\nNever attribute to malice that which can be adequately explained by stupidity.\\n\\nIn assessing someone&apos;s actions, we should not assume negative intent if there is a viable alternative explanation—different beliefs, lack of intelligence, incompetence, or ignorance.\\n\\nThe Optimist Razor\\n\\nWhen choosing who to spend time with, prioritize spending more time with optimists.\\n\\nPessimists see the doors that are closed. Optimists see the doors that are open—and probably kick down the closed doors.\\n\\nRemember: Pessimists sound smart, optimists get rich.\\n\\nThe Pygmalion Razor\\n\\nThe Pygmalion Effect says that high expectations lead to high performance (and vice versa).\\n\\nWhen working with new people and teams, choose to see each individual as their highest potential self—they will begin to achieve more.\\n\\nh/t [@KatColeATL](https://twitter.com/KatColeATL)\\n\\nThe \\&quot;What Stays the Same\\&quot; Razor\\n\\nIt&apos;s difficult to predict the future.\\n\\nJeff Bezos famously said that investing in what might change is risky, but investing in what will remain constant is safe.\\n\\nWhen building for the future, focus on the constants—focus on what stays the same.\\n\\nThe Crazy Idea Razor\\n\\nIf someone proposes a seemingly crazy idea:\\n\\n(1) Are they a domain expert?-\\n(2) Are they reasonable?\\n\\nIf yes on (1) and (2), you should take the idea seriously, as it may be an asymmetric bet on the future.\\n\\nh/t [@paulg](https://twitter.com/paulg)\\n\\nThose are 20+ of the most valuable razors I’ve discovered.\\n\\nFollow me [@SahilBloom](https://twitter.com/SahilBloom) for more threads on growth, business, and decision-making.\\n\\nI will write a deep-dive on these razors in my newsletter. Join 66,000+ others and subscribe so you don’t miss it!\\n\\n [![](https://cubox.pro/c/filters:no_upscale()?imageUrl=https%3A%2F%2Fcdn.substack.com%2Fimage%2Ffetch%2Fw_1128%2Ch_564%2Cc_fill%2Cf_jpg%2Cq_auto%3Abest%2Cfl_progressive%3Asteep%2Fhttps%253A%252F%252Fsahilbloom.substack.com%252Ftwitter%252Fsubscribe-card.svg%253Fv%253D30f9955b5dd05a783700fc252eeeb6f4%253Fversion%253D3)](https://sahilbloom.substack.com/) \\n\\n[**The Curiosity Chronicle** Delivering curiosity-inducing content every single week. Click to read The Curiosity Chronicle, by Sa ained by self-interest.\\n\\nIn assessing someone&apos;s actions, we should not assume negative intent if there is a viable alternative explanation that they are acting on rooted self-interest.\\n\\nOccam’s Razor\\n\\nThe simplest explanation is often the best one.\\n\\nSimple assumptions &gt; complex assumptions.\\n\\nSimple is beautiful.\\n\\n• • •\\n\\nMissing some Tweet in this thread? You can try to force a refresh\\n\\n\\n\\n[查看原网页: threadreaderapp.com](https://threadreaderapp.com/thread/1487436653790695428.html)&quot;,536870916]],[&quot;^1?&quot;,[606,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[606,&quot;^K&quot;,605,536870916]],[&quot;^1?&quot;,[606,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,10018,&quot;^1O&quot;,11351],536870916]],[&quot;^1?&quot;,[606,&quot;^15&quot;,230,536870916]],[&quot;^1?&quot;,[606,&quot;^11&quot;,230,536870916]],[&quot;^1?&quot;,[606,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[606,&quot;^?&quot;,&quot;~u620b979f-8527-4e14-b64e-38930f41407f&quot;,536870916]],[&quot;^1?&quot;,[607,&quot;^1K&quot;,[&quot;^1E&quot;,[]],536870916]],[&quot;^1?&quot;,[607,&quot;^Y&quot;,&quot;附图：\\n![](https://cubox.pro/c/filters:no_upscale()?imageUrl=https%3A%2F%2Fpic3.zhimg.com%2F50%2Fv2-fac11440387c78587c48d8d9e15a1b20_720w.jpg%3Fsource%3D1940ef5c)&quot;,536870916]],[&quot;^1?&quot;,[607,&quot;^V&quot;,&quot;^1A&quot;,536870916]],[&quot;^1?&quot;,[607,&quot;^K&quot;,84,536870916]],[&quot;^1?&quot;,[607,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1L&quot;,[],&quot;^1M&quot;,[],&quot;^1N&quot;,0,&quot;^1O&quot;,170],536870916]],[&quot;^1?&quot;,[607,&quot;^15&quot;,84,536870916]],[&quot;^1?&quot;,[607,&quot;^11&quot;,84,536870916]],[&quot;^1?&quot;,[607,&quot;^1R&quot;,true,536870916]],[&quot;^1?&quot;,[607,&quot;^?&quot;,&quot;~u620b979f-781c-4a0f-a5b0-95e122fb2421&quot;,536870916]],[&quot;^1?&quot;,[608,&quot;^1K&quot;,[&quot;^1E&quot;,[[&quot;^?&quot;,&quot;~u620b979f-fe37-4352-8952-69033ce5ba
